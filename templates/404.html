{% extends "layouts/base.html" %}
{% set project = "404" %}

{% block style %}
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Fraunces:opsz,wght@9..144,700&display=swap" rel="stylesheet">
<style>
  body { font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
  .mc-404 { min-height:calc(100vh - 70px); display:flex; align-items:center; justify-content:center; padding:2rem 1.1rem; }
  .mc-404-card { max-width:480px; text-align:center; padding:2.6rem 2.2rem; border-radius:24px;
    background:rgba(13,24,42,.62); border:1px solid rgba(148,197,236,.16); backdrop-filter:blur(18px);
    box-shadow:0 40px 80px -44px rgba(0,0,0,.85); }
  .mc-404-code { font-family:'Fraunces',Georgia,serif; font-weight:700; font-size:clamp(4rem,12vw,6rem); line-height:1; margin:0;
    background:linear-gradient(120deg,#fff 0%,#bfe6ff 55%,#12b0cc 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; }
  .mc-404-card h2 { color:#fff; font-size:1.3rem; margin:.6rem 0 .4rem; font-weight:700; }
  .mc-404-card p { color:#9fb6cf; margin:0 0 1.6rem; }
  .mc-404-btn { display:inline-flex; align-items:center; gap:.5rem; padding:.8rem 1.4rem; border-radius:13px; text-decoration:none;
    font-weight:800; color:#fff; background:linear-gradient(135deg,#0a7cc2,#12b0cc); box-shadow:0 16px 34px -16px rgba(10,124,194,.9); }
</style>
{% endblock %}

{% block body %}
<div class="mc-404">
  <div class="mc-404-card">
    <h1 class="mc-404-code">404</h1>
    <h2>Lost in the cosmos</h2>
    <p>That page couldn't be found. Engineering is on the case!</p>
    <a href="{{ url_for('index') }}" class="mc-404-btn"><i class="fa fa-home"></i> Go Home</a>
  </div>
</div>
{% endblock %}

{% block background %}
{% endblock %}
