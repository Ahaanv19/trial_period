{% extends "layouts/base.html" %}
{% set project = "404" %}

{% block style %}
<style>
  body { font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
  .tb-404 { min-height:calc(100vh - 70px); display:flex; align-items:center; justify-content:center; padding:2rem 1.1rem; }
  .tb-404-card { max-width:480px; text-align:center; padding:2.6rem 2.2rem; border-radius:24px;
    background:rgba(30,22,48,.62); border:1px solid rgba(168,130,240,.18); backdrop-filter:blur(18px);
    box-shadow:0 40px 80px -44px rgba(0,0,0,.85); }
  .tb-404-code { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:clamp(4rem,12vw,6rem); line-height:1; margin:0;
    background:linear-gradient(120deg,#fff 0%,#e3d5ff 55%,#b98cf0 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; }
  .tb-404-card h2 { font-family:'Space Grotesk',sans-serif; color:#fff; font-size:1.3rem; margin:.6rem 0 .4rem; font-weight:700; }
  .tb-404-card p { color:#b3a9d4; margin:0 0 1.6rem; }
  .tb-404-btn { display:inline-flex; align-items:center; gap:.5rem; padding:.8rem 1.4rem; border-radius:13px; text-decoration:none;
    font-family:'Space Grotesk',sans-serif; font-weight:700; color:#fff; background:linear-gradient(135deg,#7c53e0,#b98cf0); box-shadow:0 16px 34px -16px rgba(124,83,224,.9); }
</style>
{% endblock %}

{% block body %}
<div class="tb-404">
  <div class="tb-404-card">
    <h1 class="tb-404-code">404</h1>
    <h2>This message got left on read</h2>
    <p>That page couldn't be found. Maybe think twice before sending that URL. 💬</p>
    <a href="{{ url_for('index') }}" class="tb-404-btn"><i class="fa fa-home"></i> Go Home</a>
  </div>
</div>
{% endblock %}

{% block background %}
{% endblock %}
